name: CI

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'test/**'
      - 'scripts/**'
      - 'hardhat.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: ['*']
    paths:
      - 'contracts/**'
      - 'test/**'
      - 'scripts/**'
      - 'hardhat.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Check formatting
        run: npm run format:check

      - name: Lint Solidity
        run: npm run lint

  compile:
    name: Compile Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Compile contracts
        run: npm run compile

  test:
    name: Test Contracts
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 15
    env:
      MOCHA_TIMEOUT: '120000'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test
