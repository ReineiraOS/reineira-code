name: CI

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'test/**'
      - 'script/**'
      - 'foundry.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: ['*']
    paths:
      - 'contracts/**'
      - 'test/**'
      - 'script/**'
      - 'foundry.toml'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: git submodule update --init --recursive

      - name: Check formatting
        run: forge fmt --check

  compile:
    name: Compile Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: git submodule update --init --recursive

      - name: Compile contracts
        run: forge build --sizes

  test:
    name: Test Contracts
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: git submodule update --init --recursive

      - name: Run tests
        run: forge test -vvv
