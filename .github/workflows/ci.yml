name: CI

on:
  push:
    branches: [main, chainlink-resolver]
  pull_request:
    branches: ['*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Thorough clean
        run: rm -rf .gitmodules lib/ node_modules/

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install npm dependencies
        run: npm ci

      - name: Install forge dependencies
        run: forge install --no-git foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts@v5.4.0 FhenixProtocol/cofhe-contracts@v0.1.3 FhenixProtocol/cofhesdk@6af05d94 OpenZeppelin/openzeppelin-foundry-upgrades

      - name: Check formatting
        run: forge fmt --check

  compile:
    name: Compile Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Thorough clean
        run: rm -rf .gitmodules lib/ node_modules/

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install npm dependencies
        run: npm ci

      - name: Install forge dependencies
        run: forge install --no-git foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts@v5.4.0 FhenixProtocol/cofhe-contracts@v0.1.3 FhenixProtocol/cofhesdk@6af05d94 OpenZeppelin/openzeppelin-foundry-upgrades

      - name: Compile contracts
        run: forge build --sizes

  test:
    name: Test Contracts
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Thorough clean
        run: rm -rf .gitmodules lib/ node_modules/

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install npm dependencies
        run: npm ci

      - name: Install forge dependencies
        run: forge install --no-git foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts@v5.4.0 FhenixProtocol/cofhe-contracts@v0.1.3 FhenixProtocol/cofhesdk@6af05d94 OpenZeppelin/openzeppelin-foundry-upgrades

      - name: Run tests
        run: forge test -vvv
